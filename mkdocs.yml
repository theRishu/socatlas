site_name: SOCAtlas
site_url: https://socatlas.vercel.app/
use_directory_urls: false
site_description: SOCAtlas — 1200 interview-ready cybersecurity quick points, real SOC alert playbooks, major attack breakdowns, and complete study guides for analysts and engineers.
site_author: SOCAtlas
copyright: '&copy; 2026 SOCAtlas (v3_Manual_Only)'

theme:
  name: material
  features:
    - navigation.tracking
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.instant
    - navigation.top

markdown_extensions:
  - admonition
  - md_in_html
  - tables
  - attr_list
  - def_list
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra_css:
  - assets/site-polish.css
  - assets/pdf-builder.css
  - assets/mobile-overflow-fixes.css

extra_javascript:
  - assets/pdf-builder.js
  - assets/mobile-table-cards.js
  - assets/simulator.js

nav:
  - Home: index.md
  - 🎯 Mock Interview Simulator: interviews/simulator.md
  - 🏛️ Fundamentals:
    - Introduction to Cybersecurity: fundamentals/introduction.md
    - CIA Triad & Founding Principles: fundamentals/cia_triad.md
    - Encryption & Key Management: fundamentals/encryption.md
    - Hashing & Data Integrity: fundamentals/hashing.md
  - 🌐 Networking:
    - Networking Basics: networking/basics.md
    - OSI & TCP/IP Models: networking/osi_tcpip.md
    - Identity — AAA, DNS, DHCP: networking/aaa_dns_dhcp.md
    - Security — VPN, Firewall, Proxy: networking/vpn_firewall.md
  - 🏴‍☠️ Major Attacks Directory:
    - Vulnerabilities & Risk: threats/vulnerabilities.md
    - Cyber Threats Landscape: threats/cyber_threats.md
    - Social Engineering: threats/social_engineering.md
    - Cross-Site Scripting (XSS): attack/xss.md
    - SQL Injection (SQLi): attack/sqli.md
    - Cross-Site Request Forgery (CSRF): attack/csrf.md
    - Server-Side Request Forgery (SSRF): attack/ssrf.md
    - Man-in-the-Middle (MitM): attack/mitm.md
    - ARP Spoofing (Poisoning): attack/arp_spoofing.md
    - Denial of Service (DoS): attack/dos.md
  - 🛡️ Detection & Defense:
    - IDS & IPS: defense/ids_ips.md
    - SIEM & SOAR: defense/siem_soar.md
    - SOC — Security Operations: defense/soc.md
    - EDR, XDR & MDR: defense/edr_xdr.md
    - Cyber Kill Chain: defense/kill_chain.md
    - Incident Response: defense/incident_response.md
  - ⚖️ Governance & Compliance:
    - Compliance & Regulatory Floor: governance/compliance.md
    - Security Frameworks (NIST & ISO): frameworks.md
    - Risk & Threat Intelligence: governance/risk_threat_intel.md
    - TTPs — IOC, IOA & MITRE ATT&CK: governance/ioc_ioa_mitre.md
  - 🚨 SOC Alerts & Scenarios:
    - General Alert Handling: alerts/general.md
    - Malware Infection: alerts/malware.md
    - Ransomware Attack: alerts/ransomware.md
    - Phishing & Email: alerts/phishing.md
    - DDoS Attack: alerts/ddos.md
    - Brute Force & Spray: alerts/brute_force.md
    - CrowdStrike (EDR) Alert: alerts/crowdstrike.md
    - Impossible Travel: alerts/impossible_travel.md
    - Suspicious PowerShell: alerts/powershell.md
    - Data Exfiltration: alerts/data_exfil.md
    - SQL Injection (WAF): alerts/sqli.md
    - Privilege Escalation: alerts/priv_esc.md
  - ⚡ 1200 Quick Points:
    - Core Basics (1–100): quick/basics.md
    - Identity & Auth (101–200): quick/fundamentals.md
    - Attacker Tactics (201–300): quick/attacks.md
    - Tools & Commands (301–400): quick/tools.md
    - Security Practices (401–500): quick/practices.md
    - Domains & Kill Chain (501–600): quick/domains.md
    - Cloud & Infrastructure (601–700): quick/cloud.md
    - Cryptography (701–800): quick/cryptography.md
    - Laws & Global Standards (801–900): quick/laws.md
    - Advanced Topics (901–1000): quick/advanced.md
    - Incident & DR Operations (1001–1100): quick/incident.md
    - Expert Edge (1101–1200): quick/expert.md
  - 🚀 Career & Roadmap:
    - SOC Career Roadmap: career/roadmap.md
    - Interview Readiness: career/interview_prep.md
    - Tools Checklist: career/tools_checklist.md
